version: "3.8"

services:
  whasappc:
    build: .
    container_name: whasappc
    restart: unless-stopped
    ports:
      - "3005:3005"
    env_file:
      - ./whatsapp-engine/.env
    volumes:
      - whasappc-data:/data
      - whasappc-uploads:/app/whatsapp-engine/uploads
      - whasappc-auth:/app/whatsapp-engine/auth
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3005/healthz').then(res => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  whasappc-data:
  whasappc-uploads:
  whasappc-auth: