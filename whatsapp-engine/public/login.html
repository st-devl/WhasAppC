<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhasAppC Pro | Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.875rem;
            font-weight: 700;
            background: linear-gradient(to right, #25D366, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #94a3b8;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37, 211, 102, 0.2);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: #0f172a;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }
        button:hover {
            background: #22c55e;
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(0);
        }
        #message {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.875rem;
            min-height: 1.25rem;
        }
        .error { color: #f87171; }
        .success { color: #4ade80; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>WhasAppC Pro</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-posta</label>
                <input type="email" id="email" required placeholder="admin@example.com">
            </div>
            <div class="form-group">
                <label for="password">Şifre</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit">Giriş Yap</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function getDashboardPath() {
            // login.html ile aynı dizindeki ana sayfaya yönlendir
            return new URL('./', window.location.href).pathname;
        }

        async function isAuthenticated() {
            try {
                const response = await fetch('/api/check-auth', {
                    method: 'GET',
                    cache: 'no-store',
                    credentials: 'same-origin'
                });
                if (!response.ok) return false;
                const data = await response.json();
                return !!data.authenticated;
            } catch {
                return false;
            }
        }

        async function redirectWhenSessionReady(maxTry = 10) {
            for (let i = 0; i < maxTry; i++) {
                const ok = await isAuthenticated();
                if (ok) {
                    window.location.assign(getDashboardPath());
                    return true;
                }
                await delay(250);
            }
            return false;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageEl = document.getElementById('message');
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Giriş yapılıyor...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    messageEl.textContent = 'Giriş başarılı! Oturum doğrulanıyor...';
                    messageEl.className = 'success';
                    const redirected = await redirectWhenSessionReady();
                    if (!redirected) {
                        messageEl.textContent = 'Oturum doğrulaması gecikti. Sayfayı yenileyip tekrar deneyin.';
                        messageEl.className = 'error';
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Giriş Yap';
                    }
                } else {
                    messageEl.textContent = data.error || 'Giriş başarısız.';
                    messageEl.className = 'error';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Giriş Yap';
                }
            } catch (err) {
                messageEl.textContent = 'Bir hata oluştu.';
                messageEl.className = 'error';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Giriş Yap';
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            if (await isAuthenticated()) {
                window.location.replace(getDashboardPath());
            }
        });
    </script>
</body>
</html>
