name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  app:
    runs-on: ubuntu-latest
    env:
      WHASAPPC_DATA_DIR: ${{ runner.temp }}/whasappc-data
      SESSION_SECRET: ci-session-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASS_HASH: ci-placeholder
    defaults:
      run:
        working-directory: whatsapp-engine
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: whatsapp-engine/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build:css
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run migrate
      - run: npm audit --omit=dev --audit-level=high

  docker:
    runs-on: ubuntu-latest
    needs: app
    steps:
      - uses: actions/checkout@v5
      - run: docker build -t whasappc:${{ github.sha }} .
